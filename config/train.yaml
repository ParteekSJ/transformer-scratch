GLOBAL:
  USE_GPU: true
  RESUME: false
  RESUME_PATH: "${BASE_DIR}/train_log/2022-0926_1009/checkpoints/best.pth"
  DEVICE: 'cpu' # 'cpu' or '0' or '0,1,2,3' ...
  EPOCH_NUM: 2
  SAVE_RESULT_DIR: "${BASE_DIR}/train_log"
  SAVE_EPOCH_STEP: 1
  VAL_EPOCH_STEP: 1
  LOG_EPOCH_STEP: 1
  PRETRAINED_MODEL: "${BASE_DIR}/pretrained_model/resnet34.pth"
  DISTRIBUTED: true
  EARLY_STOP_PATIENCE: 5
  TRAIN_DIR: "${BASE_DIR}/data_dir/train"
  VAL_DIR: "${BASE_DIR}/data_dir/val"
  TEST_DIR: "${BASE_DIR}/data_dir/test"
  USE_AMP: false
  LANG_SRC: "en"
  LANG_TGT: "it"
  SEQ_LEN: 350 # GLOBAL MAXIMUM LENGTH for all sequences.
  

TRAIN:
  IMG_SIZE: 224
  TRAIN_BATCHSIZE_PER_CARD: 4
  VAL_BATCHSIZE_PER_CARD: 1
  DROP_LAST: true
  NUM_WORKERS: 4

DATASET:
  SEQ_LEN: 350
  THRESHOLD: 4

MODEL:
  NAME: transformer
  d_model: 512
  BLOCKS: 6
  HEADS: 8
  DROPOUT: 0.1
  d_ff: 2048
  

CRITERION:
  NAME: CE
  COORD_RATIO: 1
  CLASSIFIER_RATIO: 0.5

OPTIMIZER:
  NAME: Adam
  LEARNING_RATE: 0.01
  BETA1: 0.9
  BETA2: 0.999
  WEIGHT_DECAY: 0
  # LR_NAME: linear_lr
  LR_NAME: none # scheduler
  LR_DECAY: 0.1 # controls the scaling factor of the learning rate